<!DOCTYPE html>

<html lang="id" style=""><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LifeGuard Finance - Simulasi Sandbox</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f5faf8",
                        "surface-dim": "#e2e8e5",
                        "surface-bright": "#fdfdfd",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f1f7f5",
                        "surface-container": "#ebf2f0",
                        "surface-container-high": "#e2e8e5",
                        "surface-container-highest": "#d1d9d7",
                        "on-surface": "#1e293b",
                        "on-surface-variant": "#475569",
                        "primary": "#0d9488",
                        "on-primary": "#ffffff",
                        "primary-container": "#ccfbf1",
                        "on-primary-container": "#0f766e",
                        "error": "#dc2626",
                        "on-error": "#ffffff",
                        "error-container": "#fee2e2",
                        "on-error-container": "#b91c1c",
                        "outline": "#94a3b8",
                        "outline-variant": "#cbd5e1",
                        "tertiary": "#f59e0b",
                        "background": "#f5faf8",
                        "on-background": "#1e293b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "sm": "8px",
                        "xs": "4px",
                        "base": "4px",
                        "margin-desktop": "24px",
                        "gutter": "16px",
                        "xl": "32px",
                        "margin-mobile": "16px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "label-medium": ["Outfit"],
                        "headline-medium": ["Outfit"],
                        "display-large": ["Outfit"],
                        "title-medium": ["Outfit"],
                        "headline-large": ["Outfit"],
                        "body-large": ["Outfit"],
                        "label-large": ["Outfit"],
                        "body-medium": ["Outfit"],
                        "title-large": ["Outfit"]
                    },
                    "fontSize": {
                        "label-medium": ["12px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                        "headline-medium": ["28px", {"lineHeight": "36px", "fontWeight": "400"}],
                        "display-large": ["57px", {"lineHeight": "64px", "letterSpacing": "-0.25px", "fontWeight": "400"}],
                        "title-medium": ["16px", {"lineHeight": "24px", "letterSpacing": "0.15px", "fontWeight": "500"}],
                        "headline-large": ["32px", {"lineHeight": "40px", "fontWeight": "400"}],
                        "body-large": ["16px", {"lineHeight": "24px", "letterSpacing": "0.5px", "fontWeight": "400"}],
                        "label-large": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "500"}],
                        "body-medium": ["14px", {"lineHeight": "20px", "letterSpacing": "0.25px", "fontWeight": "400"}],
                        "title-large": ["22px", {"lineHeight": "28px", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Outfit', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(203, 213, 225, 0.4);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #0d9488;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(13, 148, 136, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-40 bg-surface border-b border-outline-variant flat no shadows flex items-center justify-between px-md h-16 backdrop-blur-md bg-opacity-80">
<button class="text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-95 duration-150 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-medium text-title-large font-semibold text-primary absolute left-1/2 transform -translate-x-1/2">
            Simulasi Sandbox
        </h1>
<div class="w-10 h-10 flex items-center justify-center overflow-hidden rounded-full border border-outline-variant">
<img alt="LifeGuard Logo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4m9qst3s93aPEKp-2bOs1j8FjO1XuqhexUS2L02SFPOYoya8wshKMoiXQnxELq29UPryxgQ0PTE-J-dAyvq03SZ2EyinduX4qyJ9Cjh-OPm1m5lPxDZGFabgVI3E54HZFRQiC1rbvb6TchHd64nTM-lruCRF6RE6JhlskyQp-_Pe8QTQasVtT4Me25KwlVe-Zur509dV32Snn0J7A3p6LLpvaK31blpKvm8GxP2CK4CNAPC8vX3D1ZRWYgyneRZunV5pTRPj_tRf-"/>
</div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-[80px] px-margin-mobile md:px-margin-desktop max-w-4xl mx-auto w-full space-y-6 pb-24">
<!-- Scenario Selector (Filter Chips) -->
<section class="space-y-3">
<h2 class="font-title-medium text-title-medium text-on-surface-variant">Skenario Bencana</h2>
<div class="flex flex-wrap gap-2">
<button class="flex items-center gap-2 px-4 py-2 rounded-lg bg-primary text-on-primary font-label-large text-label-large transition-colors border border-transparent shadow-sm">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">work_off</span>
                    Job Loss
                </button>
<button class="flex items-center gap-2 px-4 py-2 rounded-lg bg-surface-container text-on-surface-variant font-label-large text-label-large border border-outline transition-colors hover:bg-surface-container-highest">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">local_hospital</span>
                    Medical
                </button>
<button class="flex items-center gap-2 px-4 py-2 rounded-lg bg-surface-container text-on-surface-variant font-label-large text-label-large border border-outline transition-colors hover:bg-surface-container-highest">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">trending_up</span>
                    Inflation
                </button>
</div>
</section>
<!-- Parameter Slider Card -->
<section class="glass-panel rounded-xl p-5 shadow-sm">
<div class="flex justify-between items-end mb-4">
<h3 class="font-title-medium text-title-medium text-on-surface">Estimasi Menganggur</h3>
<span class="font-headline-medium text-title-large text-primary" id="sliderValue">6 Bulan</span>
</div>
<div class="relative w-full pt-2 pb-4">
<input class="w-full h-1 bg-outline-variant rounded-full appearance-none outline-none" id="durationSlider" max="12" min="1" oninput="document.getElementById('sliderValue').innerText = this.value + ' Bulan'" type="range" value="6"/>
<div class="flex justify-between text-on-surface-variant font-label-medium text-label-medium mt-2">
<span class="">1m</span>
<span class="">12m</span>
</div>
</div>
</section>
<!-- Projections Card -->
<section class="bg-surface-container-low rounded-xl p-6 border border-outline-variant shadow-md relative overflow-hidden">
<!-- Decorative blur blob -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-error rounded-full opacity-10 blur-2xl"></div>
<h3 class="font-title-medium text-title-medium text-on-surface mb-6 text-center">Financial Vitality Score Impact</h3>
<div class="flex items-center justify-center gap-4 md:gap-8">
<!-- Current Score -->
<div class="flex flex-col items-center">
<div class="w-20 h-20 md:w-24 md:h-24 rounded-full border-4 border-primary flex items-center justify-center bg-surface shadow-[0_0_15px_rgba(13,148,136,0.3)]">
<span class="font-display-large text-headline-large text-primary">75</span>
</div>
<span class="font-label-medium text-label-medium text-on-surface-variant mt-2 uppercase tracking-wider">Saat Ini</span>
</div>
<!-- Arrow -->
<div class="flex flex-col items-center justify-center flex-grow max-w-[80px]">
<div class="h-[2px] w-full bg-outline-variant relative">
<span class="material-symbols-outlined text-outline-variant absolute -right-2 -top-[11px] text-[24px]">arrow_right_alt</span>
</div>
<span class="font-label-medium text-label-medium text-error mt-2">-37 Pts</span>
</div>
<!-- Projected Score -->
<div class="flex flex-col items-center">
<div class="w-20 h-20 md:w-24 md:h-24 rounded-full border-4 border-error flex items-center justify-center bg-surface shadow-[0_0_15px_rgba(220,38,38,0.3)]">
<span class="font-display-large text-headline-large text-error">38</span>
</div>
<span class="font-label-medium text-label-medium text-on-surface-variant mt-2 uppercase tracking-wider">Proyeksi</span>
</div>
</div>
</section>
<!-- Stats List (Bento-style Grid) -->
<section class="grid grid-cols-1 md:grid-cols-3 gap-4">
<div class="glass-panel p-4 rounded-lg flex flex-col justify-between border border-outline-variant border-l-4 border-l-tertiary">
<span class="font-label-large text-label-large text-on-surface-variant mb-2 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">flight_takeoff</span> Runway
                </span>
<span class="font-headline-medium text-title-large text-on-surface">2.4 Bulan</span>
</div>
<div class="glass-panel p-4 rounded-lg flex flex-col justify-between border border-outline-variant border-l-4 border-l-error">
<span class="font-label-large text-label-large text-on-surface-variant mb-2 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">money_off</span> Monthly Deficit
                </span>
<span class="font-headline-medium text-title-large text-error">-Rp 3,5M</span>
</div>
<div class="glass-panel p-4 rounded-lg flex flex-col justify-between border border-outline-variant border-l-4 border-l-primary">
<span class="font-label-large text-label-large text-on-surface-variant mb-2 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">savings</span> Remaining Emergency
                </span>
<span class="font-headline-medium text-title-large text-primary">Rp 12M</span>
</div>
</section>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 w-full p-4 bg-surface border-t border-outline-variant z-40 pb-safe backdrop-blur-md bg-opacity-90 flex justify-center"><nav class="w-full max-w-md mx-auto flex justify-around items-center py-2"><button class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">dashboard</span>
<span class="text-label-medium font-label-medium">Ringkasan</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">analytics</span>
<span class="text-label-medium font-label-medium">Sandbox</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">shield</span>
<span class="text-label-medium font-label-medium">Mitigasi</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">person</span>
<span class="text-label-medium font-label-medium">Profil</span>
</button></nav></div>
</body></html>
