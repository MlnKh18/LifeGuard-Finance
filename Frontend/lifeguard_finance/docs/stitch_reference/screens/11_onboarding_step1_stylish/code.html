<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>FinFlow - Personal Information</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#006a61",
                        "secondary": "#505f76",
                        "tertiary-fixed": "#dae2fd",
                        "on-background": "#171d1c",
                        "surface-variant": "#dee4e1",
                        "primary-fixed": "#89f5e7",
                        "secondary-fixed": "#d3e4fe",
                        "primary-fixed-dim": "#6bd8cb",
                        "surface-container": "#eaefed",
                        "tertiary-fixed-dim": "#bec6e0",
                        "primary-container": "#008378",
                        "on-surface-variant": "#3d4947",
                        "on-error-container": "#93000a",
                        "surface": "#f5faf8",
                        "on-primary-fixed": "#00201d",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#6bd8cb",
                        "secondary-fixed-dim": "#b7c8e1",
                        "on-primary-fixed-variant": "#005049",
                        "background": "#f5faf8",
                        "on-primary-container": "#f4fffc",
                        "on-secondary-fixed-variant": "#38485d",
                        "tertiary-container": "#6c748b",
                        "surface-container-highest": "#dee4e1",
                        "outline-variant": "#bcc9c6",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e4e9e7",
                        "on-surface": "#171d1c",
                        "inverse-on-surface": "#edf2f0",
                        "surface-dim": "#d6dbd9",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f0f5f2",
                        "primary": "#00685f",
                        "secondary-container": "#d0e1fb",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#fefcff",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed-variant": "#3f465c",
                        "on-tertiary-fixed": "#131b2e",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#545c72",
                        "on-secondary-container": "#54647a",
                        "on-secondary-fixed": "#0b1c30",
                        "on-secondary": "#ffffff",
                        "surface-bright": "#f5faf8",
                        "inverse-surface": "#2c3130",
                        "outline": "#6d7a77"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "container-margin": "24px",
                        "base": "4px",
                        "xl": "32px",
                        "gutter": "16px",
                        "lg": "24px",
                        "xs": "4px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "title-md": ["Outfit"],
                        "body-lg": ["Outfit"],
                        "display-lg": ["Outfit"],
                        "data-tabular": ["Inter"],
                        "body-sm": ["Outfit"],
                        "headline-lg": ["Outfit"],
                        "headline-lg-mobile": ["Outfit"],
                        "label-md": ["Inter"]
                    },
                    "fontSize": {
                        "title-md": ["18px", { "lineHeight": "24px", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "fontWeight": "700" }],
                        "data-tabular": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex flex-col font-body-lg text-on-surface">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface border-b border-outline-variant dark:border-outline sticky top-0 z-50 w-full transition-colors duration-200">
<div class="flex items-center justify-between px-container-margin w-full h-16 max-w-7xl mx-auto">
<div class="flex items-center gap-xs cursor-pointer hover:bg-surface-container dark:hover:bg-surface-container-highest p-2 rounded-lg transition-colors">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<div class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary-fixed-dim">LifeGuard Finance</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center px-container-margin py-xl w-full max-w-3xl mx-auto pb-32">
<!-- Logo Header -->
<div class="mb-xl w-full flex flex-col items-center">
<img alt="Lifeguard Logo" class="w-32 h-32 object-contain mb-md drop-shadow-sm rounded-full" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBqRLH1bGvM9gde91DDVpUqY8ljJLo_bBu4uPgjaFdRnVriOKhw78xdBEgkgxdebQfdKIlJ8zz78U-w5Gb-4PKEGaKziuwtk90TZI0oHT74Sy5YEps5o8uhChM71m0BlBLMUnhKcdSQ5-IFM-19GmmbnoWoqRG452lCi5tH1PBK0wgKQ8UjyID38PjtlpX_esGj1WV9F1lFRrz_PQrKURabVj9SrvW4hCYyxrIXO10678eXCrqTl_yiyzpz-gQ4vCIxlX3Ixf8MPjr8">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface text-center">Welcome aboard</h1>
<p class="font-body-lg text-body-lg text-secondary text-center mt-xs">Let's start with the basics to set up your profile.</p>
</div>
<!-- Progress Stepper -->
<div class="w-full mb-xl">
<div class="flex items-center justify-between relative">
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-0.5 bg-surface-container-high -z-10"></div>
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-1/3 h-0.5 bg-primary -z-10 transition-all duration-500"></div>
<!-- Step 1 (Active) -->
<div class="flex flex-col items-center gap-xs">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-title-md text-title-md shadow-sm">1</div>
<span class="font-label-md text-label-md text-primary">Personal</span>
</div>
<!-- Step 2 -->
<div class="flex flex-col items-center gap-xs">
<div class="w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center font-title-md text-title-md">2</div>
<span class="font-label-md text-label-md text-secondary">Details</span>
</div>
<!-- Step 3 -->
<div class="flex flex-col items-center gap-xs">
<div class="w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center font-title-md text-title-md">3</div>
<span class="font-label-md text-label-md text-secondary">Review</span>
</div>
</div>
</div>
<!-- Form Card -->
<div class="w-full bg-surface-container-lowest rounded-xl border border-surface-container-highest p-container-margin shadow-sm relative overflow-hidden group">
<!-- Subtle gradient accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary-fixed to-primary"></div>
<form class="flex flex-col gap-lg mt-sm">
<!-- Full Name Field -->
<div class="flex flex-col gap-xs">
<label class="font-title-md text-title-md text-on-surface" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-secondary" style="font-size: 20px;">person</span>
<input class="w-full pl-12 pr-md py-3 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all duration-200 placeholder:text-secondary-fixed-dim" id="fullName" name="fullName" placeholder="Jane Doe" type="text">
</div>
<p class="font-body-sm text-body-sm text-secondary pl-1">Exactly as it appears on your ID.</p>
</div>
<!-- Occupation Field -->
<div class="flex flex-col gap-xs">
<label class="font-title-md text-title-md text-on-surface" for="occupation">Occupation</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-secondary" style="font-size: 20px;">work</span>
<input class="w-full pl-12 pr-md py-3 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all duration-200 placeholder:text-secondary-fixed-dim" id="occupation" name="occupation" placeholder="e.g. Software Engineer" type="text">
</div>
</div>
</form>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-between items-center px-lg py-md bg-surface dark:bg-surface border-t border-outline-variant dark:border-outline">
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim px-6 py-2 hover:bg-surface-variant dark:hover:bg-on-surface-variant transition-colors duration-200 rounded-lg group">
<span class="material-symbols-outlined mb-1 group-hover:-translate-x-1 transition-transform">arrow_back</span>
<span class="font-label-md text-label-md">Back</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary text-on-primary-container dark:text-on-primary rounded-full px-6 py-2 hover:bg-surface-variant dark:hover:bg-on-surface-variant hover:bg-opacity-90 active:scale-95 transition-all duration-150 group shadow-sm hover:shadow-md">
<span class="material-symbols-outlined mb-1 group-hover:translate-x-1 transition-transform">arrow_forward</span>
<span class="font-label-md text-label-md">Continue</span>
</button>
</nav>
<script>
        // Simple input focus effects
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('.material-symbols-outlined').classList.replace('text-secondary', 'text-primary');
            });
            input.addEventListener('blur', function() {
                this.parentElement.querySelector('.material-symbols-outlined').classList.replace('text-primary', 'text-secondary');
            });
        });
    </script>


</body></html>
