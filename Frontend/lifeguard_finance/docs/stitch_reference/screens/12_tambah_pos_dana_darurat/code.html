<script>
        function selectPriority(element, color) {
            // Remove active styles from siblings
            const container = element.parentElement;
            container.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('ring-2', 'ring-offset-2', 'ring-' + color, 'bg-white', 'shadow-sm');
                btn.style.boxShadow = 'none';
            });
            
            // Add active styles
            element.classList.add('bg-white', 'shadow-sm');
            element.style.boxShadow = `0 0 0 2px ${color === 'primary' ? '#00685f' : (color === 'error' ? '#ba1a1a' : '#f59e0b')}`;
        }

        function selectIcon(element) {
            const container = element.parentElement;
            container.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('border-primary', 'bg-primary-container/10', 'text-primary');
                btn.querySelector('span').style.fontVariationSettings = "'FILL' 0";
            });

            element.classList.add('border-primary', 'bg-primary-container/10', 'text-primary');
            element.querySelector('span').style.fontVariationSettings = "'FILL' 1";
        }

        // Initialize first icon as selected
        window.onload = () => {
            const firstIcon = document.querySelector('.grid button');
            if(firstIcon) selectIcon(firstIcon);
            
            const mediumPriority = document.querySelectorAll('.flex.gap-2 button')[1];
            if(mediumPriority) selectPriority(mediumPriority, 'amber-500');
        };
    </script>
