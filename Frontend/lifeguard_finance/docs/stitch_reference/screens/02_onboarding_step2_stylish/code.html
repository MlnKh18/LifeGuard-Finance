<!-- Form Section -->

<section>
<h2 class="font-title-md text-title-md text-on-surface mb-md flex items-center gap-xs border-b border-outline-variant pb-xs">
<span class="material-symbols-outlined text-secondary" data-icon="receipt_long">receipt_long</span>
                    Monthly Expenses
                </h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="rent">Housing (Rent/Mortgage)</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-sm text-secondary material-symbols-outlined" data-icon="attach_money" style="font-size: 20px;">attach_money</span>
<input class="block w-full pl-xl pr-sm py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200 outline-none" id="rent" name="rent" placeholder="0.00" type="number">
</div>
</div>
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="utilities">Utilities</label>

<span class="absolute inset-y-0 left-0 flex items-center pl-sm text-secondary material-symbols-outlined" data-icon="attach_money" style="font-size: 20px;">attach_money</span>

</div>
</div>

<span class="absolute inset-y-0 left-0 flex items-center pl-sm text-secondary material-symbols-outlined" data-icon="attach_money" style="font-size: 20px;">attach_money</span>

<div class="md:col-span-5 space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant">Debt Type</label>

<option>Auto Loan</option>
<option>Personal Loan</option>
</select>
</div>

</div>
</div>

<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
</div>
<!-- Add New Debt Button -->
<button class="w-full py-sm border border-outline-variant border-dashed rounded-lg text-primary font-title-md text-title-md flex items-center justify-center gap-xs hover:bg-primary-container hover:text-on-primary-container transition-colors duration-200" type="button">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>

<span class="font-label-md text-label-md mt-1">Continue</span>
